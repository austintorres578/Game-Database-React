<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GameDB Footer Mock</title>

<style>
    body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #030712;
        color: #e5e7eb;
    }

    /* FOOTER --------------------------- */
    .footer {
        background:
            radial-gradient(circle at top left, rgba(59, 130, 246, 0.25), transparent 55%),
            radial-gradient(circle at bottom right, rgba(236, 72, 153, 0.25), transparent 55%),
            linear-gradient(to bottom, #020617, #020617 65%, #020617);
        padding: 3rem 1.5rem;
        border-top: 1px solid rgba(255,255,255,0.1);
    }

    .footer-container {
        max-width: 1200px;
        margin: 0 auto;
    }

    .footer-title {
        font-size: 1.5rem;
        text-transform: uppercase;
        font-weight: 800;
        letter-spacing: 1px;
        margin-bottom: 2rem;
        color: #f3f4f6;
    }

    .footer-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        gap: 2rem;
        margin-bottom: 3rem;
    }

    .footer-column h3 {
        font-size: 1.1rem;
        margin-bottom: 0.75rem;
        color: #93c5fd;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .footer-column p,
    .footer-column a {
        color: #9ca3af;
        text-decoration: none;
        font-size: 0.95rem;
        line-height: 1.6;
    }

    .footer-column a:hover {
        color: #f472b6;
    }

    .footer-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 0.75rem;
    }

    .footer-tag {
        background: rgba(255,255,255,0.05);
        padding: 0.35rem 0.75rem;
        border-radius: 0.5rem;
        font-size: 0.85rem;
        color: #d1d5db;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .footer-bottom {
        text-align: center;
        font-size: 0.9rem;
        padding-top: 2rem;
        border-top: 1px solid rgba(255,255,255,0.08);
        color: #6b7280;
    }
</style>
</head>
<body>

<!-- FOOTER -->
<footer class="footer">
    <div class="footer-container">

        <h2 class="footer-title">Game Database</h2>

        <div class="footer-grid">
            <!-- Column 1 -->
            <div class="footer-column">
                <h3>About</h3>
                <p>Your personal video game companion. Browse details, ratings, screenshots & more.</p>
            </div>

            <!-- Column 2 -->
            <div class="footer-column">
                <h3>Links</h3>
                <a href="#">Home</a><br>
                <a href="#">Search</a><br>
                <a href="#">Profile</a><br>
                <a href="#">Favorites</a>
            </div>

            <!-- Column 3 (Tags style) -->
            <div class="footer-column">
                <h3>Popular Tags</h3>
                <div class="footer-tags">
                    <span class="footer-tag">Action</span>
                    <span class="footer-tag">Horror</span>
                    <span class="footer-tag">Singleplayer</span>
                    <span class="footer-tag">Open World</span>
                    <span class="footer-tag">RPG</span>
                    <span class="footer-tag">Platformer</span>
                </div>
            </div>
        </div>

        <div class="footer-bottom">
            © 2025 GameDB. All rights reserved.
        </div>
    </div>
</footer>

</body>
</html>
