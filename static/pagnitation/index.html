<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Custom Dropdown Pagination</title>

<style>
    body {
        margin: 0;
        padding: 2rem;
        background: #030712;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        color: #f3f4f6;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    h1 {
        margin-bottom: 2rem;
        color: #e5e7eb;
        font-size: 1.8rem;
        font-weight: 600;
    }

    /* PAGINATION WRAPPER */
    .pagination-shell {
        display: flex;
        gap: 1rem;
        align-items: center;
        margin-top: 3rem;
    }

    /* BUTTONS */
    .page-btn {
        padding: 0.55rem 1.4rem;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.85);
        border: 1px solid rgba(148, 163, 184, 0.35);
        color: #e5e7eb;
        font-size: 0.88rem;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s ease;
    }

    .page-btn:hover:not(:disabled) {
        border-color: #22c55e;
        color: #bbf7d0;
        box-shadow: 0 0 14px rgba(34, 197, 94, 0.35);
        transform: translateY(-2px);
    }

    .page-btn:disabled {
        opacity: 0.45;
        cursor: default;
    }

    /* CUSTOM DROPDOWN CONTAINER */
    .dropdown {
        position: relative;
        width: 160px;
    }

    .dropdown-trigger {
        padding: 0.55rem 1.4rem;
        background: rgba(15, 23, 42, 0.92);
        border-radius: 999px;
        border: 1px solid rgba(31, 41, 55, 0.8);
        box-shadow: 0 10px 20px rgba(0,0,0,0.35);
        backdrop-filter: blur(6px);
        cursor: pointer;
        color: #e5e7eb;
        font-size: 0.9rem;
        font-weight: 600;
        text-align: center;

        display: flex;
        justify-content: center;
        align-items: center;

        transition: 0.2s ease;
    }

    .dropdown-trigger:hover {
        border-color: #22c55e;
        box-shadow: 0 0 14px rgba(34, 197, 94, 0.35);
    }

    /* DROPDOWN MENU */
    .dropdown-menu {
        display: none;
        position: absolute;
        top: 105%;
        left: 0;
        width: 100%;
        background: rgba(15, 23, 42, 0.98);
        border: 1px solid rgba(51, 65, 85, 0.7);
        border-radius: 0.6rem;
        box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        padding: 0.4rem 0;
        backdrop-filter: blur(8px);
        z-index: 10;
    }

    .dropdown.open .dropdown-menu {
        display: block;
        animation: fadeIn 0.15s ease-out;
    }

    /* MENU ITEM */
    .dropdown-item {
        padding: 0.55rem 1rem;
        font-size: 0.9rem;
        color: #e5e7eb;
        cursor: pointer;
        transition: 0.2s ease;
        text-align: center;
    }

    .dropdown-item:hover {
        background: rgba(34, 197, 94, 0.15);
        color: #bbf7d0;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(4px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const dropdown = document.querySelector(".dropdown");
        const trigger = document.querySelector(".dropdown-trigger");

        trigger.addEventListener("click", () => {
            dropdown.classList.toggle("open");
        });

        document.addEventListener("click", (e) => {
            if (!dropdown.contains(e.target)) {
                dropdown.classList.remove("open");
            }
        });
    });
</script>

</head>

<body>

<h1>Custom Pagination Dropdown</h1>

<div class="pagination-shell">

    <button class="page-btn" disabled>‹ Prev</button>

    <div class="dropdown">
        <div class="dropdown-trigger">Page 5 ▾</div>

        <div class="dropdown-menu">
            <div class="dropdown-item">Page 1</div>
            <div class="dropdown-item">Page 2</div>
            <div class="dropdown-item">Page 3</div>
            <div class="dropdown-item">Page 4</div>
            <div class="dropdown-item">Page 5</div>
        </div>
    </div>

    <button class="page-btn">Next ›</button>

</div>

</body>
</html>
